<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magical Login</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
<style>
/* Flip animation */
@keyframes flip-card { 0% { transform: rotateY(0deg); } 50% { transform: rotateY(15deg); } 100% { transform: rotateY(0deg); } }
.animate-flip { animation: flip-card 10s infinite linear; }

/* Failure shake */
@keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
.shake { animation: shake 0.5s; border: 2px solid red; }
</style>
</head>
<body class="bg-gradient-to-r from-purple-200 via-pink-200 to-yellow-200 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl p-10 shadow-xl w-96 animate-flip {% if status == 'fail' %}shake{% endif %} {% if status == 'success' %}border-green-500{% endif %}">
    <h2 class="text-2xl font-bold mb-6 text-center text-purple-700">Magical Login</h2>
    <form method="POST" action="/login/">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500">
      <input type="password" name="password" placeholder="Password" class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-purple-500">
      <button type="submit" class="w-full py-3 mt-4 bg-purple-600 text-white font-bold rounded-lg hover:bg-purple-700 hover:scale-105 transition-all">Login</button>
    </form>
  </div>
</body>
</html>
